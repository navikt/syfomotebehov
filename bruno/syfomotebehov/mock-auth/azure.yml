info:
  name: azure
  type: http
  seq: 2

http:
  method: GET
  url: http://localhost:8811/syfomotebehov/local/mocktoken/azuread?fnr={{tokenFnr}}&clientId={{clientId}}&navIdent={{navIdent}}
  params:
    - name: fnr
      value: "{{tokenFnr}}"
      type: query
    - name: clientId
      value: "{{clientId}}"
      type: query
    - name: navIdent
      value: "{{navIdent}}"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
