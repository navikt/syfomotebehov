info:
  name: tilbakemelding
  type: http
  seq: 4

http:
  method: POST
  url: "{{veilederBasePath}}/motebehov/tilbakemelding"
  headers:
    - name: Nav-Personident
      value: "{{personident}}"
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "varseltekst": "{{varseltekst}}",
        "motebehovId": "{{motebehovId}}"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
