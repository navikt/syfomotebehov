info:
  name: meld_motebehov_all_inputs
  type: http
  seq: 4

http:
  method: POST
  url: "{{arbeidsgiverBasePath}}/motebehov"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "arbeidstakerFnr": "{{arbeidstakerFnr}}",
        "virksomhetsnummer": "{{virksomhetsnummer}}",
        "formSubmission": {
          "harMotebehov": true,
          "formSnapshot": {
            "formIdentifier": "motebehov-arbeidsgiver-meld",
            "formSemanticVersion": "{{formSemanticVersion}}",
            "fieldSnapshots": [
              {
                "fieldId": "begrunnelseText",
                "fieldType": "TEXT",
                "label": "Hvorfor ønsker du et dialogmøte? (Må fylles ut)",
                "value": "Dette er en begrunnelse",
                "description": "Hva ønsker du å ta opp i møtet? Hva tenker du at Nav kan bistå med? Ikke skriv sensitiv informasjon, for eksempel detaljerte opplysninger om helse."
              },
              {
                "fieldId": "onskerSykmelderDeltarCheckbox",
                "fieldType": "CHECKBOX_SINGLE",
                "label": "Jeg ønsker at sykmelder (lege/behandler) også deltar i møtet.",
                "value": true
              },
              {
                "fieldId": "onskerSykmelderDeltarBegrunnelseText",
                "fieldType": "TEXT",
                "label": "Hvorfor ønsker du at lege/behandler deltar i møtet?",
                "value": "Behandler må være med",
                "wasRequired": true
              },
              {
                "fieldId": "onskerTolkCheckbox",
                "fieldType": "CHECKBOX_SINGLE",
                "label": "Vi har behov for tolk.",
                "value": true
              },
              {
                "fieldId": "tolkSprakText",
                "fieldType": "TEXT",
                "label": "Hva slags tolk har dere behov for?",
                "value": "Engelsk tolk",
                "wasRequired": true
              }
            ]
          }
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
