info:
  name: meld_motebehov
  type: http
  seq: 2

http:
  method: POST
  url: "{{arbeidsgiverBasePath}}/motebehov"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "arbeidstakerFnr": "{{arbeidstakerFnr}}",
        "virksomhetsnummer": "{{virksomhetsnummer}}",
        "formSubmission": {
          "harMotebehov": {{harMotebehov}},
          "formSnapshot": {
            "formIdentifier": "{{formIdentifier}}",
            "formSemanticVersion": "{{formSemanticVersion}}",
            "fieldSnapshots": [
              {"fieldId":"harBehovRadioGroup","fieldType":"RADIO_GROUP","label":"Har dere behov for et dialogmøte med Nav?","description":"Du svarer på vegne av arbeidsgiver. Den ansatte har fått det samme spørsmålet og svarer på vegne av seg selv.","options":[{"optionId":"Ja","optionLabel":"Ja, vi har behov for et dialogmøte.","wasSelected":true},{"optionId":"Nei","optionLabel":"Nei, vi har ikke behov for et dialogmøte nå.","wasSelected":false}],"selectedOptionId":"Ja","selectedOptionLabel":"Ja, vi har behov for et dialogmøte."}
            ]
          }
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
