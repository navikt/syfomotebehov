info:
  name: meld_motebehov
  type: http
  seq: 2

http:
  method: POST
  url: "{{arbeidsgiverBasePath}}/motebehov"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "arbeidstakerFnr": "{{arbeidstakerFnr}}",
        "virksomhetsnummer": "{{virksomhetsnummer}}",
        "formSubmission": {
          "harMotebehov": {{harMotebehov}},
          "formSnapshot": {
            "formIdentifier": "{{formIdentifier}}",
            "formSemanticVersion": "{{formSemanticVersion}}",
            "fieldSnapshots": []
          }
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
