opencollection: 1.0.0

info:
  name: syfomotebehov
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  auth:
    type: bearer
    token: "{{token}}"
  variables:
    - name: basePath
      value: http://localhost:8811/syfomotebehov
    - name: token
      value: ""
    - name: tokenFnr
      value: "01010112345"
    - name: clientId
      value: dialogmote-frontend
    - name: navIdent
      value: Z999999
    - name: harMotebehov
      value: "true"
    - name: formSemanticVersion
      value: 1.0.0
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
    presets:
      request:
        type: http
